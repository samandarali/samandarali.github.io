<style>
:root{
  --bg:#ebe3db;--bg-2:#fffdf5;--panel:#0f1730;--panel-2:#0c1428;
  --border:rgba(120,140,200,0.14);--border-2:rgba(139,92,246,0.35);
  --txt:#e6ecff;--mute:#8b95b8;--dim:#5a647f;
  --violet:#a78bfa;--violet-2:#8b5cf6;--cyan:#22d3ee;--blue:#3b82f6;
  --grad-title:linear-gradient(90deg, #7a3d0f 0%, #c46319 35%, #c1611a 70%,#ec8b1b 100%);
  --grad-node:linear-gradient(135deg,#8b5cf6,#22d3ee);
  --shadow:0 20px 60px -20px rgba(0,0,0,0.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;line-height:1.6;min-height:100vh}
body{
  background:
   radial-gradient(1200px 600px at 80% -10%,rgba(139,92,246,0.18),transparent 60%),
   radial-gradient(900px 500px at 10% 10%,rgba(34,211,238,0.10),transparent 60%),
   var(--bg);
}
.wrap{max-width:1360px;margin:0 auto;padding:32px 28px 60px}

/* ============ HERO ============ */
.hero{position:relative;padding:12px 4px 0px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start}
.hero-eyebrow{color:#7a3d0f;font-weight:600;font-size:18px;margin-bottom:8px;font-family:'Sora',sans-serif}
.hero h1{font-family:'Sora',sans-serif;font-size:clamp(38px,5.5vw,68px);font-weight:800;letter-spacing:-0.02em;line-height:1.05;background:var(--grad-title);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
.hero p.sub{color:#5d4037;max-width:640px;font-size:16px; font-weight:500;}
.hero-illustration{
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-illustration img{
    width:100%;
    max-width:480px;
    height:auto;

    filter:
        drop-shadow(0 0 30px rgba(34,211,238,.35))
        drop-shadow(0 0 80px rgba(139,92,246,.25));
}
.top-icons{position:absolute;top:8px;right:8px;display:flex;gap:14px;align-items:center}
.top-icons .ico{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;color:#cbd5ff;cursor:pointer}
.top-icons .avatar{width:100px;height:100px;border-radius:50%; background-image:url("../images/mojgan.png"); background-size:cover; background-position:center;
    border:2px solid rgba(255,255,255,.8);    box-shadow:0 4px 12px rgba(0,0,0,.18);}

/* ============ ROADMAP ============ */
/* ============ ROADMAP ============ */

.roadmap{margin:0px 0 28px; display:grid; grid-template-columns:repeat(8,1fr); gap:6px; position:relative; top:-10px;}

/* Connection line */
.roadmap::before{
    content:"";    position:absolute;    left:6%;    right:6%;    top:62px;    height:2px;
    background:repeating-linear-gradient(90deg, rgba(193,97,26,.45) 0 8px, transparent 8px 16px  );
    z-index:0;
}

/* Each node */

.node{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    z-index:1;
    padding:4px;
}


.node-img{
    filter: invert(35%) sepia(75%) saturate(900%) hue-rotate(150deg);
}
/* Number */

.node .num{
    position:absolute;
    top:-2px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#ffffff;
    border:1px solid rgba(193,97,26,.45);
    display:grid;
    place-items:center;
    font-size:11px;
    font-weight:700;
    color:#7a3d0f;
    z-index:3;
    transition:.25s;
}

/* Circle */

.node .circle{
    margin-top:12px;
    width:88px;
    height:88px;
    border-radius:50%;
    background:
        radial-gradient(
          circle at 50% 40%,
          rgba(193,97,26,.12),
          #fffaf5 70%
        );

    border:2px solid rgba(193,97,26,.35); display:grid;  place-items:center; color:#7a3d0f;transition:transform .25s,  box-shadow .25s, border-color .25s;
}

/* SVG */

.node .circle svg{    width:36px;    height:36px;    stroke:url(#nodeGrad);    fill:none;    stroke-width:1.6;}
.node .circle img.node-img{width:46px;height:46px;object-fit:contain;filter:none;}

/* Label */
.node .label{margin-top:12px; font-weight:600; font-size:12.5px; text-align:center; color:#7a3d0f; line-height:1.25;}

/* Hover */
.node:hover .circle{  transform:translateY(-3px);border-color:#c1611a; box-shadow: 0 6px 20px rgba(226, 12, 12, 0.25);}

/* Active circle */

.node.active .circle{   border-color:#7a3d0f; box-shadow: 0 0 0 6px rgba(228, 205, 3, 0.16),  0 10px 30px rgba(233, 4, 4, 0.25);}

/* Active number */

.node.active .num{    background:#c1611a;    color:white;    border-color:#c1611a;}

/* Active label */

.node.active .label{    color:#0f766e;    font-weight:700;}


/* ============ LOADED NODE CONTENT ============ */
.node-content-shell{
    margin-top:18px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
    min-height:700px;
    padding:18px;
    overflow:hidden;
}
.node-content-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(120,140,200,.14);
}
.node-content-head h2{
    font-family:'Sora',sans-serif;
    font-size:20px;
    color:#fff;
    margin:0;
}
.node-content-head .file-name{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:#a78bfa;
    background:rgba(139,92,246,.14);
    border:1px solid rgba(139,92,246,.35);
    padding:5px 10px;
    border-radius:999px;
}
.node-frame{
    width:100%;
    min-height:820px;
    border:0;
    border-radius:14px;
    background:#fff;
}
@media (max-width:1100px){
  .node-content-head{align-items:flex-start;flex-direction:column;}
  .node-frame{min-height:900px;}
}

/* ============ WORKSPACE 3 COLUMNS ============ */
.workspace{display:grid;grid-template-columns:280px 1fr 420px;gap:18px;margin-top:18px}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);min-height:540px;padding:22px}
.panel h2{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.panel h2 .count{margin-left:auto;background:rgba(139,92,246,.18);color:#c4b5fd;border:1px solid rgba(139,92,246,.4);font-size:12px;padding:2px 10px;border-radius:999px;font-weight:600}
.panel h2 .num-tag{color:#a78bfa}

/* left */
.sub-list{display:flex;flex-direction:column;gap:4px;position:relative}
.sub-list::before{content:"";position:absolute;left:14px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,transparent,rgba(139,92,246,.35),transparent)}
.sub-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;color:#bfc8e6;font-size:14px;font-weight:500;transition:.2s;position:relative}
.sub-item .ic{width:30px;height:30px;border-radius:8px;background:rgba(139,92,246,.10);display:grid;place-items:center;color:#a78bfa;font-size:14px;flex-shrink:0;z-index:1}
.sub-item:hover{background:rgba(139,92,246,.07);color:#fff}
.sub-item.active{background:linear-gradient(90deg,rgba(139,92,246,.22),rgba(34,211,238,.05));color:#fff;border:1px solid rgba(139,92,246,.45)}
.sub-item.active .ic{background:rgba(139,92,246,.3);color:#fff}
.view-all{margin-top:14px;padding:10px;text-align:center;color:#a78bfa;font-size:13px;cursor:pointer;border-top:1px dashed rgba(139,92,246,.25)}

/* middle */
.content h3{font-family:'Sora',sans-serif;font-size:22px;margin-bottom:10px;color:#fff}
.content .lede{color:#b8c1dc;margin-bottom:18px;font-size:14.5px}
.callout{background:linear-gradient(135deg,rgba(139,92,246,.14),rgba(34,211,238,.06));border:1px solid rgba(139,92,246,.32);border-radius:14px;padding:14px 16px;display:flex;gap:14px;margin-bottom:20px}
.callout .badge{width:34px;height:34px;border-radius:9px;background:rgba(139,92,246,.35);display:grid;place-items:center;color:#fff;font-weight:700;font-family:'JetBrains Mono';font-size:14px;flex-shrink:0}
.callout .ttl{font-weight:700;color:#fff;margin-bottom:2px;font-size:14.5px}
.callout .ex{color:#9aa5c8;font-size:13px}
.content h4{font-family:'Sora',sans-serif;font-size:16px;margin:16px 0 10px;color:#e8ecff}
.checklist{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.chk{display:flex;align-items:flex-start;gap:10px;color:#cfd6ef;font-size:14px}
.chk .dot{width:20px;height:20px;border-radius:50%;background:rgba(139,92,246,.25);border:1px solid rgba(167,139,250,.6);display:grid;place-items:center;color:#a78bfa;font-size:11px;flex-shrink:0;margin-top:2px}
.tbl{width:100%;border-collapse:collapse;background:rgba(11,16,32,.4);border-radius:12px;overflow:hidden;border:1px solid rgba(120,140,200,.1)}
.tbl th,.tbl td{padding:12px 16px;text-align:left;font-size:13.5px;border-bottom:1px solid rgba(120,140,200,.08)}
.tbl th{background:rgba(139,92,246,.10);color:#cfd6ef;font-weight:600}
.tbl td{color:#bfc8e6}
.tbl tr:last-child td{border-bottom:none}
.tip-bar{margin-top:18px;display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(90deg,rgba(245,158,11,.12),transparent);border:1px solid rgba(245,158,11,.35);border-radius:10px;color:#fde68a;font-size:13.5px}

/* right code */
.code-panel{background:linear-gradient(180deg,#0b1124,#070b1a);padding:18px;position:relative;overflow:hidden}
.code-tab{display:inline-block;padding:6px 14px;background:rgba(139,92,246,.22);border:1px solid rgba(139,92,246,.4);border-radius:8px;font-family:'JetBrains Mono';font-size:12px;color:#c4b5fd;margin-bottom:12px}
.copy-btn{position:absolute;top:22px;right:22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#cfd6ef;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.copy-btn:hover{background:rgba(139,92,246,.18)}
pre.code{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#cdd6f4;white-space:pre;overflow:auto;max-height:520px;padding-right:8px}
.code .com{color:#65b58a}
.code .kw{color:#c084fc}
.code .str{color:#f9c97c}
.code .fn{color:#7dd3fc}
.code .num{color:#fda4af}

@media (max-width:1100px){
  .workspace{grid-template-columns:1fr}
  .roadmap{grid-template-columns:repeat(4,1fr);row-gap:18px}
  .roadmap::before{display:none}
.hero{
    grid-template-columns:70% 30%;
}
.hero-illustration img{
    background:transparent;
}

/* ============ RENDER ============ */
const roadmapEl = document.getElementById('roadmap');

function titleToFileName(title){
  return title
    .toLowerCase()
    .replace(/&/g, ' ')
    .replace(/\(.*?\)/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '') + '.html';
}

function loadNode(sec){
  document.querySelectorAll('.node').forEach(n=>n.classList.toggle('active', n.dataset.id===sec.id));

  const fileName = sec.page || titleToFileName(sec.title);
  document.getElementById('loadedTitle').textContent = sec.title;
  /* document.getElementById('loadedFile').textContent = fileName; */
  document.getElementById('nodeFrame').src = fileName;
}

ROADMAP.forEach((sec,i)=>{
  const el = document.createElement('div');
  el.className = 'node' + (i===0?' active':'');
  el.dataset.id = sec.id;
  el.innerHTML = `
    <div class="num">${sec.num}</div>
    <div class="circle">${ICONS[sec.icon]}</div>
    <div class="label">${sec.label.replace(/\n/g,'<br>')}</div>`;
  el.addEventListener('click',()=>loadNode(sec));
  roadmapEl.appendChild(el);
});

// init: load the first node under the roadmap
loadNode(ROADMAP[0]);

/* ============ PYTHON HIGHLIGHTER ============ */
function highlight(src){
  const esc = src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = esc.split('\n').map(line=>{
    // comments first
    const cIdx = line.indexOf('#');
    let code = line, comment = '';
    if(cIdx >= 0){ code = line.slice(0,cIdx); comment = `<span class="com">${line.slice(cIdx)}</span>`; }
    code = code.replace(/('[^']*'|"[^"]*")/g,'<span class="str">$1</span>');
    code = code.replace(/\b(import|from|as|def|return|if|else|for|in|not|and|or|class|with|lambda|print|True|False|None)\b/g,'<span class="kw">$1</span>');
    code = code.replace(/\b([a-zA-Z_][\w]*)\(/g,'<span class="fn">$1</span>(');
    code = code.replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>');
    return code + comment;
  });
  return lines.join('\n');
}

function copyCode(){
  const txt = document.getElementById('codeBox').innerText;
  navigator.clipboard.writeText(txt);
  const btn = document.querySelector('.copy-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '✓ Copied';
  setTimeout(()=>btn.innerHTML = orig, 1400);
}
