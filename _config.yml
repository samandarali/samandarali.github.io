# Cleaned _config.yml focused on essential tabs for homepage

locale: "en-US"
title: "Mojgan Samandar A. E. - Economist & Data Analyst"
title_separator: "|"
name: &name "Mojgan Samandar A. E."
description: &description "Ph.D. Economist | Big Data Analyst | Researcher | Policy & BI Consultant"
url: "https://samandarali.github.io"
baseurl: ""
repository: "samandarali/samandarali.github.io"

# Author Info
author:
  avatar: "Samandar Ali Eshtehardi-Mojgan-PR photo.jpg"
  name: *name
  pronouns: "she/her"
  bio: *description
  location: "Ontario, Canada"
  email: "mojgan.samandar@outlook.com"
  linkedin: "mojgan-samandar"
  googlescholar: "https://scholar.google.ca/citations?hl=en&user=fYvemsMAAAAJ"
  orcid: "https://orcid.org/0000-0001-5770-7398"
  github: "samandarali"

# Site Appearance
teaser: "header.jpg"
breadcrumbs: true
read_more: "enabled"

# Comments
comments:
  provider: false

# Atom/RSS Feed
atom_feed:
  hide: false

# Social Media & SEO
twitter:
  username: ""
facebook:
  username: ""
  app_id: ""
  publisher: ""
og_image: "avatar.jpg"
social:
  type: "Person"
  name: *name
  links:
    - https://linkedin.com/in/mojgan-samandar
    - https://github.com/samandarali
    - https://scholar.google.ca/citations?hl=en&user=fYvemsMAAAAJ

# Analytics
analytics:
  provider: false

# Files
include:
  - _pages
  - files
exclude:
  - .github
  - node_modules
  - vendor
  - tmp
  - README
  - LICENSE
keep_files:
  - .git

# Markdown & Conversion
encoding: "utf-8"
markdown_ext: "md"
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Collections for Website Tabs
collections:
  education:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/
  workshops:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults for Each Section
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: education
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: workshops
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Permalinks & Timezone
permalink: /:categories/:title/
timezone: America/Toronto

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Archives (Optional)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
